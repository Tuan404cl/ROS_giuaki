/**:
  ros__parameters:
    # 1. Đồng bộ hệ tọa độ với xe tank của bạn
    odom_frame: odom
    map_frame: map
    base_frame: base_link   
    scan_topic: /scan
    
    use_sim_time: true
    mode: mapping

    # 2. Tăng độ kiên nhẫn chờ tọa độ từ Gazebo (Cứu tinh của lỗi Failed to compute)
    transform_timeout: 0.5  # Chờ 0.5 giây trước khi báo lỗi
    tf_buffer_duration: 5.0 # Bộ nhớ đệm lưu tọa độ trong 5 giây
   
    # 3. Cấu hình bản đồ
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.5
    minimum_laser_range: 0.2
    minimum_travel_distance: 0.1
